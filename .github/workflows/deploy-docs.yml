name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "packages/**"
      - ".github/workflows/deploy-docs.yml"
  pull_request:
    paths:
      - "apps/docs/**"

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    name: Build and deploy docs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter @santi020k/dep-beacon-docs build

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler pages deploy apps/docs/dist --project-name=dep-beacon-docs --branch=${{ github.ref_name }}
