name: Bug report
description: Report a reproducible Dep Beacon problem
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Dep Beacon. Please include enough detail for someone else to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Dep Beacon reports an outdated status for...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the problem.
      placeholder: |
        1. Open a workspace with...
        2. Add this dependency...
        3. Run...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: manifest
    attributes:
      label: Relevant manifest or workspace config
      description: Paste the smallest relevant package.json, pnpm-workspace.yaml, override, catalog, or dependency entry.
      render: json
  - type: input
    id: extension-version
    attributes:
      label: Dep Beacon version
      placeholder: 0.0.0
  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      placeholder: 1.100.0
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: 22.13.0
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add Dep Beacon output, diagnostics, screenshots, or recordings if relevant.
