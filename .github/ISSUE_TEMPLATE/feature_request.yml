name: Feature request
description: Suggest an improvement for Dep Beacon
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Clear use cases make it much easier to design the right behavior.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this improve?
      placeholder: When reviewing dependencies, I need...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, UI, command, or API you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other approaches have you tried?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - VS Code extension
        - Core analyzer
        - Documentation site
        - Release or tooling
        - Other
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Add dependency specs, manifests, screenshots, or links that clarify the request.
