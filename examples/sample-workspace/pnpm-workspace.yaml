packages:
  - "packages/*"

catalog:
  # Dev tooling — pinned for consistency across all packages
  "@this-org/does-not-exist": ^1.0.0
  "@types/express": ^5.0.0
  "@types/node": ^26.0.0
  axios: 0.21.1
  clsx: ^2.1.1
  cross-env: ^7.0.0
  date-fns: ^3.6.0
  eslint: ^10.5.0
  express: ^4.21.0
  helmet: ^8.0.0
  helmet-alias: npm:helmet@^8.0.0
  private-tools: git+https://github.com/example/private-tools.git#semver:^1.0.0
  semver: ^5.7.2
  typescript: ^6.0.3
  uuid: ^10.0.0
  via-github: github:expressjs/express
  vitest: ^4.1.9

  # Runtime dependencies in various update states
  astro: ^7.0.0 # up-to-date
  debug: ^3.2.7 # outdated: v4 is available
  left-pad: 1.1.0 # outdated: 1.3.0 is available
  lodash: ^3.10.1 # outdated: v4 major available

catalogs:
  react19:
    react: ^19.2.7 # up-to-date
    react-dom: ^19.0.0
    react-router: ^7.0.0

  react18:
    express: ^0.0.0
    react: ^18.3.0 # outdated relative to react19
    react-dom: ^18.3.0

  conflicts_astro_h6_4_0:
    astro: ^6.4.0

  conflicts_typescript_h5_4_0:
    typescript: ^5.4.0
  conflicts_lodash_h4_17_21:
    lodash: ^4.17.21
  conflicts_react18_h4_21_0:
    express: ^4.21.0
  "conflicts_conflicts_astro_h6_4_0_l:":
    astro: "l:"
  "conflicts_conflicts_astro_h6_4_0_la:":
    astro: "la:"
  "conflicts_conflicts_astro_h6_4_0_lat:":
    astro: "lat:"
  "conflicts_conflicts_astro_h6_4_0_late:":
    astro: "late:"
  "conflicts_conflicts_astro_h6_4_0_lates:":
    astro: "lates:"
  "conflicts_conflicts_astro_h6_4_0_latest:":
    astro: "latest:"

overrides:
  # Workspace-wide security overrides
  debug: ^4.4.3
  rollup: ^4.62.2
  semver: ^7.8.5
  vite: ^8.0.16

packageExtensions:
  # Fixing incomplete peer dep declarations in published packages
  express@4:
    peerDependencies:
      body-parser: ^2.0.0
    dependencies:
      body-parser: ^2.0.0
  left-pad@*:
    dependencies:
      debug: ^4.4.3
